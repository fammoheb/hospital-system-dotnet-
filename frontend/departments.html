<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Hospital Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">🏥 Hospital Management</div>
            <ul class="navbar-nav">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="doctors.html">Doctors</a></li>
                <li><a href="patients.html">Patients</a></li>
                <li><a href="appointments.html">Appointments</a></li>
                <li><a href="departments.html" class="active">Departments</a></li>
            </ul>
            <div class="navbar-right">
                <div class="user-info" id="userInfo"></div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="action-bar">
            <h2>Departments</h2>
            <div class="action-bar-right" id="adminActions" style="display: none;">
                <button class="btn btn-primary" onclick="openAddDepartmentModal()">+ Add Department</button>
            </div>
        </div>

        <div id="departmentsContainer" class="spinner-container">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- Add/Edit Department Modal -->
    <div id="departmentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Department</h2>
                <button class="modal-close" onclick="closeDepartmentModal()">×</button>
            </div>
            <form id="departmentForm">
                <div class="form-group">
                    <label for="departmentName">Department Name</label>
                    <input type="text" id="departmentName" required>
                </div>

                <div class="form-group">
                    <label for="departmentDescription">Description</label>
                    <textarea id="departmentDescription" required></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeDepartmentModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Department</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/departments.js"></script>
</body>
</html>
