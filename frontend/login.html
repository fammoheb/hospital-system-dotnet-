<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Hospital Management System</h1>
                <p>Login to your account</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <div class="auth-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>

            <div class="auth-link" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <strong>Demo Credentials:</strong>
                <p style="font-size: 0.85rem; margin: 0.5rem 0;">
                    Admin: admin@clinic.com / Admin123!<br>
                    Doctor: john.smith@clinic.com / Doctor123!<br>
                    Patient: alice.brown@email.com / Patient123!
                </p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
